<div class="search-page">
  <header>
    <h1>Sprout Scout</h1>
    <p>Find vegan dishes at restaurants near you</p>
  </header>

  <div class="search-box">
    <input
      type="text"
      [(ngModel)]="zipCode"
      placeholder="Enter zip code (e.g. 1010)"
      maxlength="4"
      (keyup.enter)="search()"
    />
    <select disabled title="More countries coming soon">
      <option value="AT">Austria</option>
    </select>
    <button (click)="search()" [disabled]="loading()">
      {{ loading() ? 'Searching...' : 'Search' }}
    </button>
  </div>

  @if (loading() && scanProgress(); as p) {
    <div class="scan-progress">
      <span class="spinner"></span>
      <span>Scanning {{ p.scanned }} / {{ p.total }} restaurants...</span>
      @if (scanCapped()) {
        <span class="cap-note">(limited to first {{ p.total }})</span>
      }
    </div>
  }

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  <div class="results">
    @for (item of items(); track item.restaurant.id) {
      <app-restaurant-card
        [restaurant]="item.restaurant"
        [scan]="item.scan"
      />
    }
  </div>
</div>

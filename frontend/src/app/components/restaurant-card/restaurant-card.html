<div class="card">
  @if (amenityLabel) {
    <span class="amenity-tag">{{ amenityLabel }}</span>
  }
  <div class="card-info">
    <h3>{{ restaurant.name }}</h3>
    <span class="badge">Vegan options found</span>
    @if (restaurant.address) {
      <p class="address">{{ restaurant.address }}</p>
    }
    @if (restaurant.phone) {
      <p class="phone">{{ restaurant.phone }}</p>
    }
  </div>
  <a class="primary-link" [href]="primaryLink.url" target="_blank" rel="noopener">
    {{ primaryLink.label }} →
  </a>
</div>
